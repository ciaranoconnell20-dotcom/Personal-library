<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Shopping List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #itemInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #itemInput:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        #shoppingList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .list-item:hover {
            background: #f0f0f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .list-item.completed {
            opacity: 0.6;
        }

        .list-item.completed .item-text {
            text-decoration: line-through;
            color: #999;
        }

        .list-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .item-text {
            flex: 1;
            color: #333;
            font-size: 16px;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 10px;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .qty-btn {
            width: 25px;
            height: 25px;
            padding: 0;
            font-size: 14px;
            background: #667eea;
            border-radius: 3px;
        }

        .qty-value {
            min-width: 20px;
            text-align: center;
            color: #333;
            font-weight: 600;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .clear-btn {
            flex: 1;
            background: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
        }

        .clear-btn:hover {
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .export-btn {
            flex: 1;
            background: #51cf66;
            padding: 12px;
            border-radius: 8px;
        }

        .export-btn:hover {
            box-shadow: 0 10px 20px rgba(81, 207, 102, 0.3);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            .item-quantity {
                margin-right: 5px;
            }

            .item-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Shopping List</h1>
        <p class="subtitle">Keep track of what you need to buy</p>

        <div class="input-container">
            <input 
                type="text" 
                id="itemInput" 
                placeholder="Add an item..." 
                autocomplete="off"
            >
            <button onclick="addItem()">Add</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalItems">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="completedItems">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="remainingItems">0</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <ul id="shoppingList"></ul>

        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>Your shopping list is empty</p>
            <p style="font-size: 12px; margin-top: 5px;">Add items to get started!</p>
        </div>

        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button class="export-btn" onclick="exportList()">📥 Export</button>
            <button class="clear-btn" onclick="clearAll()">🗑️ Clear All</button>
        </div>
    </div>

    <script>
        // Initialize the list from localStorage
        let shoppingList = JSON.parse(localStorage.getItem('shoppingList')) || [];

        // DOM Elements
        const itemInput = document.getElementById('itemInput');
        const shoppingListEl = document.getElementById('shoppingList');
        const emptyState = document.getElementById('emptyState');
        const actionButtons = document.getElementById('actionButtons');
        const totalItemsEl = document.getElementById('totalItems');
        const completedItemsEl = document.getElementById('completedItems');
        const remainingItemsEl = document.getElementById('remainingItems');

        // Add item with Enter key
        itemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addItem();
            }
        });

        function addItem() {
            const itemText = itemInput.value.trim();
            
            if (itemText === '') {
                itemInput.focus();
                return;
            }

            const newItem = {
                id: Date.now(),
                text: itemText,
                completed: false,
                quantity: 1
            };

            shoppingList.push(newItem);
            saveList();
            renderList();
            itemInput.value = '';
            itemInput.focus();
        }

        function removeItem(id) {
            shoppingList = shoppingList.filter(item => item.id !== id);
            saveList();
            renderList();
        }

        function toggleItem(id) {
            const item = shoppingList.find(item => item.id === id);
            if (item) {
                item.completed = !item.completed;
                saveList();
                renderList();
            }
        }

        function updateQuantity(id, delta) {
            const item = shoppingList.find(item => item.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
                saveList();
                renderList();
            }
        }

        function renderList() {
            shoppingListEl.innerHTML = '';

            if (shoppingList.length === 0) {
                emptyState.style.display = 'block';
                actionButtons.style.display = 'none';
                updateStats();
                return;
            }

            emptyState.style.display = 'none';
            actionButtons.style.display = 'flex';

            shoppingList.forEach(item => {
                const li = document.createElement('li');
                li.className = `list-item ${item.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input 
                        type="checkbox" 
                        ${item.completed ? 'checked' : ''} 
                        onchange="toggleItem(${item.id})"
                    >
                    <span class="item-text">${escapeHtml(item.text)}</span>
                    <div class="item-quantity">
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">−</button>
                        <span class="qty-value">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    </div>
                    <button class="delete-btn" onclick="removeItem(${item.id})">×</button>
                `;
                shoppingListEl.appendChild(li);
            });

            updateStats();
        }

        function updateStats() {
            const total = shoppingList.length;
            const completed = shoppingList.filter(item => item.completed).length;
            const remaining = total - completed;

            totalItemsEl.textContent = total;
            completedItemsEl.textContent = completed;
            remainingItemsEl.textContent = remaining;
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all items?')) {
                shoppingList = [];
                saveList();
                renderList();
            }
        }

        function exportList() {
            let exportText = '📋 SHOPPING LIST\n';
            exportText += '='.repeat(30) + '\n\n';

            const remaining = shoppingList.filter(item => !item.completed);
            const completed = shoppingList.filter(item => item.completed);

            if (remaining.length > 0) {
                exportText += '📌 TO BUY:\n';
                remaining.forEach(item => {
                    exportText += `  ☐ ${item.text} (qty: ${item.quantity})\n`;
                });
                exportText += '\n';
            }

            if (completed.length > 0) {
                exportText += '✓ COMPLETED:\n';
                completed.forEach(item => {
                    exportText += `  ✓ ${item.text} (qty: ${item.quantity})\n`;
                });
            }

            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shopping-list-${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        function saveList() {
            localStorage.setItem('shoppingList', JSON.stringify(shoppingList));
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Initial render
        renderList();
    </script>
</body>
</html>
